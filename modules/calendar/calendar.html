<div class="calendar" role="grid">
  <nav class="heading" aria-label="Weekly navigation">
    <button type="button" aria-label="Previous week">←</button>
    <span class="detail m" aria-live="polite"></span>
    <button type="button" aria-label="Next week">→</button>
  </nav>
  <div class="header" role="rowgroup">
    <ol class="detail s" role="row">
      <li role="columnheader">Mon</li>
      <li role="columnheader">Tue</li>
      <li role="columnheader">Wed</li>
      <li role="columnheader">Thu</li>
      <li role="columnheader">Fri</li>
      <li role="columnheader">Sat</li>
      <li role="columnheader">Sun</li>
    </ol>
  </div>
  <div class="weeks-wrapper">
    <ol class="weeks" role="rowgroup"></ol>
    <span class="sentinel" aria-hidden="true"></span>
  </div>
</div>
