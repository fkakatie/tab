<div class="tasks">
  <form id="add-task" class="add add-task">
    <div class="text-wrapper">
      <textarea name="task" id="add-task-title" class="field text" aria-label="Add a task" placeholder="Add a task…"
        rows="1" required></textarea>
    </div>
    <div class="details" hidden>
      <div class="meta">
        <input type="date" name="due-date" id="add-task-due-date" class="field date" aria-label="Due date">
        <input type="url" name="url" id="add-task-url" class="field url" aria-label="Link URL" autocomplete="off"
          placeholder="https://…">
        <div class="field toggle" role="group" aria-label="Section">
          <label>
            <input type="radio" name="section" checked value="prioritized">
            <span>Prioritized</span>
          </label>
          <label>
            <input type="radio" name="section" value="parking">
            <span>Parking Lot</span>
          </label>
        </div>
      </div>
      <div class="button-wrapper">
        <button type="submit" class="button save">Save</button>
        <button type="reset" class="button cancel">Cancel</button>
      </div>
    </div>
  </form>
  <div class="heading">
    <h2 class="detail m">Tasks</h2>
  </div>
  <div class="lists">
    <section class="list prioritized">
      <div class="heading">
        <h3 class="detail s">Prioritized</h3>
        <span class="counter">0</span>
      </div>
      <ol class="tasks-list"></ol>
    </section>
    <section class="list parking">
      <div class="heading">
        <h3 class="detail s">Parking Lot</h3>
        <span class="counter">0</span>
      </div>
      <ul class="tasks-list"></ul>
    </section>
    <details class="list completed">
      <summary>
        <div class="heading">
          <img src="icons/angle-up.svg" data-icon alt="" aria-hidden="true">
          <h3 class="detail s">Completed</h3>
          <span class="counter">0</span>
        </div>
      </summary>
      <ul class="tasks-list"></ul>
    </details>
  </div>
</div>
